# OpenEnv Specification File
# Clinical Decision Support Environment

name: clinical-decision-support
version: "1.0.0"
description: >
  An AI Clinical Decision Support Environment that simulates real-world
  medical diagnostic scenarios. Agents must analyze patient symptoms,
  gather history, order tests, and make diagnosis/treatment decisions
  through a multi-step interaction loop.

author: Clinical AI Research Team
license: MIT
tags:
  - healthcare
  - clinical-decision
  - diagnosis
  - medical-ai
  - openenv

# Environment Specification
environment:
  type: episodic
  max_steps: 25
  action_space:
    type: discrete
    actions:
      - ask_question
      - order_test
      - suggest_diagnosis
      - recommend_treatment
      - request_consultation
      - finalize_case
  observation_space:
    type: structured
    fields:
      - name: chief_complaint
        type: string
      - name: presenting_symptoms
        type: array
      - name: patient_history
        type: object
      - name: vitals
        type: object
      - name: lab_results
        type: array
      - name: question_answers
        type: object
      - name: current_diagnoses
        type: array
      - name: current_treatments
        type: array
      - name: urgency_level
        type: string
  reward_range: [-2.0, 2.0]

# API Endpoints
api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
      description: Reset environment to initial state
      request_schema:
        task_id: string
        case_id: string (optional)
        seed: integer (optional)
      response_schema:
        observation: Observation
        task_id: string
        episode_id: string
    step:
      method: POST
      path: /step
      description: Execute action and get next observation
      request_schema:
        action_type: string
        action_value: string
        reasoning: string (optional)
      response_schema:
        observation: Observation
        reward: Reward
        done: boolean
        info: object
    state:
      method: GET
      path: /state
      description: Get current environment state
      response_schema:
        observation: Observation
        ground_truth_diagnosis: array
        ground_truth_treatment: array
        episode_complete: boolean
        final_score: number
    health:
      method: GET
      path: /health
      description: Health check endpoint
      response_schema:
        status: string

# Tasks Definition
tasks:
  - id: easy_diagnosis
    name: Basic Diagnosis Challenge
    difficulty: easy
    description: >
      Diagnose common conditions with clear presentations.
      Straightforward cases with obvious symptoms and standard workup.
    max_steps: 15
    passing_score: 0.6
    grader_type: programmatic

  - id: medium_diagnosis
    name: Complex Diagnosis Challenge
    difficulty: medium
    description: >
      Manage cases requiring multi-step reasoning.
      Emergency presentations, multiple risk factors, and time-sensitive decisions.
    max_steps: 20
    passing_score: 0.55
    grader_type: programmatic

  - id: hard_diagnosis
    name: Expert Diagnosis Challenge
    difficulty: hard
    description: >
      Handle challenging cases with atypical presentations,
      multiple comorbidities, rare conditions, and diagnostic pitfalls.
    max_steps: 25
    passing_score: 0.5
    grader_type: programmatic

# Grading Configuration
grading:
  score_range: [0.0, 1.0]
  components:
    - name: diagnosis_accuracy
      weight: 0.40
      description: Correct primary diagnosis identification
    - name: test_coverage
      weight: 0.20
      description: Ordering required diagnostic tests
    - name: history_gathering
      weight: 0.15
      description: Asking critical history questions
    - name: treatment_appropriateness
      weight: 0.15
      description: Recommending appropriate treatments
    - name: safety
      weight: 0.10
      description: Avoiding contraindicated treatments

# Deployment Configuration
deployment:
  platform: huggingface-spaces
  runtime: docker
  port: 7860
  resources:
    vcpu: 2
    memory: 8gb

# Inference Configuration
inference:
  script: inference.py
  timeout_minutes: 20
  required_env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
